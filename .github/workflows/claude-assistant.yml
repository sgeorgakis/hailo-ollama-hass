name: Claude Assistant

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude-response:
    # Only run if comment mentions @claude or issue is assigned to claude-bot
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'opened' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'assigned' && github.event.assignee.login == 'claude-bot')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install anthropic

      - name: Run Claude Assistant
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REPO_NAME: ${{ github.repository }}
        run: |
          python .github/scripts/claude_assistant.py

      - name: Create branch and PR if changes made
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH_NAME="claude/issue-${ISSUE_NUMBER}"
            git config user.name "Claude Assistant"
            git config user.email "claude-bot@users.noreply.github.com"
            git checkout -b "$BRANCH_NAME"
            git add -A
            git commit -m "fix: resolve issue #${ISSUE_NUMBER}

          Automated changes by Claude Assistant.

          Co-Authored-By: Claude <noreply@anthropic.com>"
            git push -u origin "$BRANCH_NAME"

            gh pr create \
              --title "fix: resolve issue #${ISSUE_NUMBER}" \
              --body "## Summary

          This PR addresses issue #${ISSUE_NUMBER}.

          Changes were automatically generated by Claude Assistant based on the issue description.

          ## Related Issue
          Closes #${ISSUE_NUMBER}

          ---
          🤖 Generated with Claude Assistant" \
              --base main \
              --head "$BRANCH_NAME"
          fi
